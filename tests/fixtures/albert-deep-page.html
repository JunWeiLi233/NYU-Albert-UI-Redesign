<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Academic Planner</title></head>
<body><main class="ps_box-page" aria-label="Sanitized deep Albert page">
  <nav class="ps_box-breadcrumbs" aria-label="Breadcrumb"><a href="#albert">Albert</a><span>Academic Planner</span></nav>
  <h1 class="ps_box-pagetitle">Academic Planner</h1>
  <div class="PSMESSAGE" role="alert">Sanitized planning status.</div>
  <section class="PSGROUPBOX"><h2 class="PAGROUPBOXLABELLEVEL1">Planning summary</h2><p>Sanitized placeholder content with no student data.</p><button type="button">Native planner action placeholder</button></section>
  <section class="PSGROUPBOX"><h2 class="PAGROUPBOXLABELLEVEL1">Requirements</h2><table><thead><tr><th scope="col">Area</th><th scope="col">Status</th></tr></thead><tbody><tr><td>Sanitized requirement</td><td>[status removed]</td></tr></tbody></table></section>
  <form action="/native/planner" method="post"><input type="hidden" name="native_token" value="synthetic-token"><label for="term">Planning term</label><select id="term" name="term"><option>Sanitized term</option></select><span class="PSERROR" role="alert">Sanitized validation placeholder.</span><button type="submit">Native planner action placeholder</button></form>
  <div class="ps_box-actions"><button type="button">Return to planner</button></div>
</main></body></html>
