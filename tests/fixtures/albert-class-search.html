<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Class Search</title>
  </head>
  <body>
    <main class="ps_box-page" aria-label="Sanitized Class Search">
      <h1 class="ps_box-pagetitle">Class Search</h1>
      <section class="ps_box-search" aria-label="Search criteria">
        <label>
          Term
          <select>
            <option>Sanitized term</option>
          </select>
        </label>
        <label>
          Subject
          <input type="text" value="" />
        </label>
        <button type="button">Search</button>
      </section>
      <section class="ps_grid-flex" aria-label="Sanitized search results">
        <div class="ps_grid-header" role="row">
          <span role="columnheader">Course</span>
          <span role="columnheader">Status</span>
        </div>
        <div role="row">
          <span role="cell">Placeholder course</span>
          <span role="cell">Placeholder status</span>
        </div>
      </section>
      <button class="PSPUSHBUTTON" type="button">Add to Cart</button>
      <button class="PSPUSHBUTTON" type="button">Enroll</button>
    </main>
  </body>
</html>
