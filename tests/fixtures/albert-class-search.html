<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Class Search</title></head>
<body><main class="ps_box-page" aria-label="Sanitized Class Search">
  <h1 class="ps_box-pagetitle">Class Search</h1>
  <section class="ps_box-search" aria-label="Search criteria">
    <label for="term">Term</label><select id="term" name="term"><option>Sanitized term</option></select>
    <label for="subject">Subject</label><input id="subject" name="subject" type="text" value="">
    <label for="career">Career</label><select id="career" name="career"><option>Sanitized career</option></select>
    <button type="button">Search</button>
  </section>
  <section class="ps_grid-flex" aria-label="Sanitized search results">
    <div class="ps_grid-header" role="row"><span role="columnheader">Course</span><span role="columnheader">Status</span><span role="columnheader">Meeting</span></div>
    <div role="row"><span role="cell">TEST-UA 000</span><span role="cell">Open</span><span role="cell">[meeting details removed]</span></div>
  </section>
  <form class="ps_box-actions" action="/native/enrollment" method="post">
    <input type="hidden" name="native_token" value="synthetic-token">
    <button class="PSPUSHBUTTON" type="submit" name="action" value="cart">Add to Cart</button>
    <button class="PSPUSHBUTTON" type="submit" name="action" value="enroll">Enroll</button>
  </form>
</main></body></html>
